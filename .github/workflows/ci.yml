name: ci

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: show python version
        run: python3 --version

      - name: build docker image
        run: docker build -t hello-actions:${{ github.sha }} .
